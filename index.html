<html lang="en">

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

	<link rel="stylesheet" href="https://luizagsoaress.github.io/InfoEstados/css/style.css">

<body>
	<div class="container-fluid">
		<div class="container">
			<form action="#" class="form-login">
				<div class="titulo-wrapper"><h1>Entre em sua conta</h1></div>
				<div class="divisor-h1"></div>
				<div class="email-senha-container">
					<div class="email-wrapper"><label for="input-email">Email</label><input type="text" class="input-email" placeholder="exemplo@gmail.com"></div>
					<div class="senha-wrapper"><label for="input-senha">Senha</label><input type="password" class="input-senha" placeholder="**********"></div>
				</div>
				<div class="confirmar-wrapper"><button href="#" class="confirmar-btn" type="submit">Confirmar</button></div>
				<div class="recuperacao-senha-wrapper"><a href="https://luizagsoaress.github.io/InfoEstados/html/recuperar.html">Esqueceu a senha?</a></div>
				<div class="divisor-sociais"></div>
				<div class="sociais-wrapper"><a href="#" class="google-btn"><img src="https://luizagsoaress.github.io/InfoEstados/imagens/google.png" alt="google">Google</a><a href="#" class="github-btn"><img src="imagens/github.png" alt="github">Github</a></div>
				<div class="cadastro-wrapper"><span href="#">Ainda não tem uma conta?</span><a href="https://luizagsoaress.github.io/InfoEstados/html/cadastro.html">Cadastre-se</a></div>
			</form>
		</div>
	</div>


  	<noscript>Você precisa ter o javascript ligado para ver o site completo</noscript>
	<script src="https://accounts.google.com/gsi/client" async defer></script>
